<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="screen"></div>
            <div class="buttons">
                <button class="button" id="clear">C</button>
                <button class="button" id="f1">f1</button>
                <button class="button" id="f2">f2</button>
                <button class="button" id="f3">f3</button>
                <button class="button" id="f4">f4</button>
                <button class="button number" id="seven">7</button>
                <button class="button number" id="eight">8</button>
                <button class="button number" id="nine">9</button>
                <button class="button" id="divide">÷</button>
                <button class="button" id="f5">f5</button>
                <button class="button number" id="four">4</button>
                <button class="button number" id="five">5</button>
                <button class="button number" id="six">6</button>
                <button class="button" id="multiply">x</button> 
                <button class="button" id="f6">f6</button>
                <button class="button number" id="one">1</button>
                <button class="button number" id="two">2</button>
                <button class="button number" id="three">3</button>
                <button class="button" id="subtract">-</button>
                <button class="button" id="f7">f7</button>
                <button class="button number" id="zero">0</button>
                <button class="button" id="f8">f8</button>
                <button class="button" id="f9">f9</button>
                <button class="button" id="add">+</button>
                <button class="button" id="equal">=</button>
            </div>
        </div>
    </div>
</body>
</html>
